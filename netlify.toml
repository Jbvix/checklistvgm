[build]
  publish = "."
  functions = "netlify/functions"

# XAI_API_KEY — variavel no painel Netlify (Site > Environment variables).
# Apos criar ou alterar variaveis, faca um novo deploy para as funcoes enxergarem a chave.
# Opcional: XAI_MODEL (padrao grok-2-latest). Nunca commite o valor da chave neste arquivo.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
