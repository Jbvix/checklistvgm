[build]
  # Se docs/*.pdf estiverem no repo, regenera o indice; senao usa knowledge-index.json commitado.
  command = "if [ -f docs/normam-201.pdf ]; then npm ci && npm run build:knowledge; else echo 'Indice KRATOS: usando arquivo em netlify/functions/data/'; fi"
  publish = "."
  functions = "netlify/functions"

[functions.kratos]
  timeout = 26

# GPT_API_KEY — chave OpenAI no painel Netlify (Site > Environment variables).
# Apos criar ou alterar variaveis, faca um novo deploy para as funcoes enxergarem a chave.
# Opcional: GPT_MODEL (padrao gpt-4o-mini). GPT_API_BASE para proxy ou endpoint compativel (padrao https://api.openai.com/v1).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
