[build]
  # Se docs/*.pdf estiverem no repo, regenera o indice; senao usa knowledge-index.json commitado.
  command = "if [ -f docs/normam-201.pdf ]; then npm ci && npm run build:knowledge; else echo 'Indice KRATOS: usando arquivo em netlify/functions/data/'; fi"
  publish = "."
  functions = "netlify/functions"

[functions.kratos]
  timeout = 26

# XAI_API_KEY — variavel no painel Netlify (Site > Environment variables).
# Apos criar ou alterar variaveis, faca um novo deploy para as funcoes enxergarem a chave.
# Opcional: XAI_MODEL (padrao grok-4.3). KRATOS_WEB_SEARCH=true ativa busca na web (mais lento).
# KRATOS usa API Responses da xAI com web_search (MAIB, Marinha, IMO, gov.br).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
